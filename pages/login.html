<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type="imagex/png" href="../icon/logo.ico">
  <title>Login | MaravilhaGym</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>

  <div class="container">
    <div class="login-card">

      <div class="logo">

        <img src="../img/logo.jpg" alt="Logo">

      </div>

      <h2>Login</h2>

      <form id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="seu@email.com" required>
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input type="password" name="senha" placeholder="••••••••" required>
        </div>

        <button class="login-btn" type="submit">Entrar</button>

        <p class="footer-text" id="msgLogin"></p>
        <p class="footer-text">
          Não tem conta?
          <a href="cadastro.html" style="color: white; font-weight: 600; text-decoration: underline;">
            Cadastrar
          </a>
        </p>
      </form>

      <div class="footer-text">
        Projeto Treino • Foco & Disciplina
      </div>

    </div>
  </div>

  <script src="../java/login.js"></script>

</body>

</html>
